<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Dreamlights · Configuratore LED PRO · Roma</title>
  <meta name="description" content="Configura il tuo impianto LED professionale con Dreamlights Roma. Scegli colore, intensità, metratura e ottieni una stima immediata." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0a0a0f; min-height: 100vh; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; color: #fff; }
    button { font-family: inherit; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: #2a2a2a; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid #0a0f1a; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
  const { useState, useRef } = React;
  const h = React.createElement;

  const LED_PRESETS = [
    { id: "warm3000", label: "Bianco Caldo", sub: "3000K", color: "#FFE090", glow: "#FFB020", tube: "#FFC840", preview: "#FFD870", note: "Caldo classico", stock: "disponibile" },
    { id: "orange",   label: "Arancione",    sub: "Neon",  color: "#FF9020", glow: "#FF4400", tube: "#FF6A00", preview: "#FF7010", note: "Neon classico", stock: "disponibile" },
    { id: "warm2300", label: "Bianco Caldo", sub: "2300K", color: "#FFD080", glow: "#FF8800", tube: "#FFA020", preview: "#FFB030", note: "Ambrato", stock: "ordinabile" },
    { id: "cold4000", label: "Bianco Neutro", sub: "4000K", color: "#E8F4FF", glow: "#70BAFF", tube: "#A8D8FF", preview: "#C0E4FF", note: "Brillante", stock: "ordinabile" },
    { id: "purple",   label: "Viola",        sub: "Neon",  color: "#E080FF", glow: "#A000FF", tube: "#D040FF", preview: "#E070FF", note: "Intenso", stock: "ordinabile" },
    { id: "green",    label: "Verde",        sub: "Neon",  color: "#80FF90", glow: "#00FF44", tube: "#40FF6A", preview: "#70FF85", note: "Fluo", stock: "ordinabile" },
    { id: "red",      label: "Rosso",        sub: "Neon",  color: "#FF8080", glow: "#FF0000", tube: "#FF4040", preview: "#FF6060", note: "Deep Red", stock: "ordinabile" },
    { id: "yellow",   label: "Giallo",       sub: "Neon",  color: "#FFFF80", glow: "#D4FF00", tube: "#EEEE40", preview: "#FFFF60", note: "Vivo", stock: "ordinabile" },
  ];

  const PREZZO_PER_METRO = 30;

  function LedPreview({ ledColor, brightness, tubeWidth, isNight, bgImage, overlayLayout }) {
    const b = Math.max(0.1, brightness / 100);
    const { color, glow, tube } = ledColor;
    const tw = tubeWidth * 1.8;
    const W = 560, H = 300;

    // Coordinate dei percorsi LED dinamici basati sul selettore layout
    let paths = [];
    if (overlayLayout === "porte" || !bgImage) {
      // Layout a due porte (default originale)
      paths = [
        "M 60 255 L 60 60 L 230 60 L 230 255",
        "M 330 255 L 330 60 L 500 60 L 500 255"
      ];
    } else if (overlayLayout === "vetrina") {
      // Cornice perimetrale della vetrina/facciata
      paths = ["M 35 265 L 35 35 L 525 35 L 525 265"];
    } else if (overlayLayout === "insegna") {
      // Linea orizzontale superiore dritta per insegna negozio
      paths = ["M 50 70 L 510 70"];
    }

    const bpBg = isNight ? "#030305" : "#0a0f1a";
    const bpGrid = isNight ? "rgba(255,255,255,0.02)" : "rgba(80,140,255,0.06)";
    const bpLine = isNight ? "rgba(255,255,255,0.08)" : "rgba(100,160,255,0.18)";
    const bpDash = isNight ? "rgba(255,255,255,0.04)" : "rgba(100,160,255,0.11)";
    const bpText = isNight ? "rgba(255,255,255,0.2)" : "rgba(120,170,255,0.35)";

    const d1 = { x: 60,  y: 60, w: 170, h: 195 };
    const d2 = { x: 330, y: 60, w: 170, h: 195 };

    function DoorBlueprint({ d }) {
      if (bgImage) return null; // Nascondi linee finto CAD se c'è la foto reale
      return h('g', null,
        h('rect', { x: d.x-14, y: d.y-14, width: d.w+28, height: d.h+14, fill:'none', stroke: bpLine, strokeWidth:1, strokeDasharray:'6 4' }),
        h('rect', { x: d.x, y: d.y, width: d.w, height: d.h, fill: 'rgba(80,140,255,0.03)', stroke: bpLine, strokeWidth:0.8 }),
        h('text', { x: d.x+d.w/2, y: d.y+81, textAnchor:'middle', fontSize:7, fill: bpText, fontFamily:'monospace', letterSpacing:2 }, 'INGRESSO'),
        h('text', { x: d.x+d.w/2, y: d.y+d.h+25, textAnchor:'middle', fontSize:6, fill: bpText, fontFamily:'monospace' }, (d.w*10)+' cm')
      );
    }

    const gridLines = bgImage ? [] : Array.from({length:10}).map((_,i) =>
      h('line', { key:i, x1:30, y1:30+i*22, x2:W-30, y2:30+i*22, stroke:bpDash, strokeWidth:0.3 })
    );

    return h('svg', { viewBox:`0 0 ${W} ${H}`, style:{width:'100%',borderRadius:12,display:'block', transition:'background 0.3s'} },
      h('defs', null,
        h('pattern', { id:'grid', x:0, y:0, width:20, height:20, patternUnits:'userSpaceOnUse' },
          h('path', { d:'M 20 0 L 0 0 0 20', fill:'none', stroke:bpGrid, strokeWidth:0.5 })
        )
      ),
      // Background (Colore o Foto dell'utente)
      h('rect', { width:W, height:H, fill:bpBg }),
      bgImage && h('image', { href: bgImage, width: W, height: H, preserveAspectRatio: 'xMidYMid slice', opacity: isNight ? 0.45 : 0.85 }),
      !bgImage && h('rect', { width:W, height:H, fill:'url(#grid)' }),
      
      // Struttura tecnica (visibile solo senza foto)
      !bgImage && h('g', null,
        h('rect', { x:30, y:20, width:W-60, height:10, fill:'none', stroke:bpLine, strokeWidth:0.8, strokeDasharray:'8 4' }),
        h('line', { x1:30, y1:20, x2:W-30, y2:20, stroke:bpLine, strokeWidth:1 }),
        ...gridLines,
        h(DoorBlueprint, { d:d1 }),
        h(DoorBlueprint, { d:d2 })
      ),

      // Rendering dei tubi LED su percorsi dinamici
      paths.map((p, index) => {
        const nightMultiplier = isNight ? 1.6 : 1;
        return h('g', { key: index },
          h('path', { d:p, fill:'none', stroke:glow, strokeWidth:tw*16, strokeLinecap:'round', strokeLinejoin:'round', opacity:0.06*b*nightMultiplier, style:{filter:'blur(22px)'} }),
          h('path', { d:p, fill:'none', stroke:glow, strokeWidth:tw*7,  strokeLinecap:'round', strokeLinejoin:'round', opacity:0.14*b*nightMultiplier, style:{filter:'blur(7px)'} }),
          h('path', { d:p, fill:'none', stroke:glow, strokeWidth:tw*3,  strokeLinecap:'round', strokeLinejoin:'round', opacity:0.42*b*nightMultiplier, style:{filter:'blur(2px)'} }),
          h('path', { d:p, fill:'none', stroke:tube, strokeWidth:tw,    strokeLinecap:'round', strokeLinejoin:'round', opacity:0.97 }),
          h('path', { d:p, fill:'none', stroke:color,strokeWidth:tw*0.42,strokeLinecap:'round', strokeLinejoin:'round', opacity:b }),
          h('path', { d:p, fill:'none', stroke:'white',strokeWidth:tw*0.16,strokeLinecap:'round',strokeLinejoin:'round',opacity:0.45*b,strokeDasharray:'7 16' })
        );
      }),

      h('text', { x:36, y:16, fontSize:6, fill: bgImage ? 'rgba(210,230,255,0.7)' : bpText, fontFamily:'monospace', letterSpacing:2 }, 'DREAMLIGHTS ROMA · CONFIGURATORE VIRTUALE IN TEMPO REALE')
    );
  }

  function App() {
    const [preset, setPreset] = useState(LED_PRESETS[0]);
    const [brightness, setBrightness] = useState(85);
    const [tubeWidth, setTubeWidth] = useState(5);
    const [metri, setMetri] = useState(9);
    const [isNight, setIsNight] = useState(false);
    const [showRiepilogo, setShowRiepilogo] = useState(false);
    
    // Nuovi stati per upload foto e gestione linea guida
    const [bgImage, setBgImage] = useState(null);
    const [overlayLayout, setOverlayLayout] = useState("porte");
    const fileInputRef = useRef(null);

    const prezzoTotale = metri * PREZZO_PER_METRO;
    const tw = tubeWidth;
    
    const mmReali = tw <= 3 ? 13 : tw <= 5 ? 17 : tw <= 8 ? 24 : 26;
    const tubeLabel = mmReali + "mm · " + (tw <= 3 ? "Slim" : tw <= 5 ? "Standard" : tw <= 8 ? "Large" : "XL");

    // Calcolo ROI Energetico Dinamico (Confronto con Neon in Vetro Tradizionale)
    const wattLedtot = metri * 11; // ~11W al metro
    const wattNeonVecchio = metri * 45; // ~45W al metro per i vecchi tubi neon
    const oreGiorni = 8;
    const costoKwh = 0.28; // Tariffa media retail Roma 2026
    const consumoAnnuoLed = (wattLedtot * oreGiorni * 365) / 1000;
    const consumoAnnuoNeon = (wattNeonVecchio * oreGiorni * 365) / 1000;
    const spesaLed = consumoAnnuoLed * costoKwh;
    const spesaNeon = consumoAnnuoNeon * costoKwh;
    const risparmioAnnuo = Math.round(spesaNeon - spesaLed);

    const handleFileChange = (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => setBgImage(event.target.result);
        reader.readAsDataURL(file);
      }
    };

    const sliderStyle = (col) => ({ width:'100%', accentColor: col });
    const card = { background:'#161616', borderRadius:14, padding:16, border:'1px solid #222', marginBottom:12, width:'100%' };
    const label = { color:'#555', fontSize:10, letterSpacing:3, textTransform:'uppercase', marginBottom:10, display:'block' };

    const generaPDF = () => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFillColor(10, 10, 15);
      doc.rect(0, 0, 210, 40, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(22);
      doc.text("DREAMLIGHTS ROMA", 20, 20);
      doc.setFont("helvetica", "normal");
      doc.setFontSize(10);
      doc.setTextColor(150, 150, 150);
      doc.text("Preventivo Indicativo Impianto LED Professionale", 20, 30);
      doc.setTextColor(40, 40, 40);
      doc.setFontSize(14);
      doc.setFont("helvetica", "bold");
      doc.text("Riepilogo Configurazione:", 20, 60);

      const dettagli = [
        ["Colore LED:", preset.label + " (" + preset.sub + ") - " + preset.stock.toUpperCase()],
        ["Intensita Luminosa:", brightness + "%"],
        ["Spessore Tubo:", tubeLabel],
        ["Metratura Richiesta:", metri + " metri lineari"],
        ["Risparmio Luce Stimato:", "Circa EUR " + risparmioAnnuo + " all'anno"],
        ["Prezzo Stimato Materiale:", "EUR " + prezzoTotale + ",00 + IVA"]
      ];

      doc.setFont("helvetica", "normal");
      doc.setFontSize(12);
      let yPos = 75;
      dettagli.forEach(([label, value]) => {
        doc.setFont("helvetica", "bold");
        doc.text(label, 20, yPos);
        doc.setFont("helvetica", "normal");
        doc.text(value, 80, yPos);
        yPos += 10;
      });

      doc.save("Preventivo_Dreamlights_" + metri + "m.pdf");
    };

    return h('div', { style:{ minHeight:'100vh', background:'#0a0a0f', display:'flex', flexDirection:'column', alignItems:'center', padding:'24px 16px 60px', maxWidth:520, margin:'0 auto' } },

      // HEADER
      h('div', { style:{ width:'100%', textAlign:'center', marginBottom:22 } },
        h('div', { style:{ fontSize:10, letterSpacing:5, color:'#2a4a7a', textTransform:'uppercase', marginBottom:8, fontFamily:'monospace' } }, 'Roma · Illuminazione Professionale'),
        h('div', { style:{ fontSize:30, fontWeight:900, color:'#fff', letterSpacing:4, textTransform:'uppercase' } }, 'Dreamlights'),
        h('div', { style:{ width:'40px', height:'2px', background:'linear-gradient(90deg,transparent,#4a8aff,transparent)', margin:'10px auto' } }),
        h('div', { style:{ fontSize:11, color:'#3a5a8a', letterSpacing:1 } }, 'Configura online · Visualizza sul tuo locale')
      ),

      // CONFIGURATORE VISIVO CON UPLOAD FOTO
      h('div', { style:{ width:'100%', borderRadius:14, overflow:'hidden', boxShadow:'0 8px 40px rgba(0,0,0,0.8)', border:'1px solid rgba(80,140,255,0.15)', marginBottom:12, position:'relative', background: isNight ? '#030305' : '#0a0f1a' } },
        h(LedPreview, { ledColor:preset, brightness, tubeWidth:tw, isNight, bgImage, overlayLayout }),
        
        h('div', { style:{ position:'absolute', top:10, left:10, background:'rgba(0,0,0,0.8)', backdropFilter:'blur(4px)', borderRadius:20, padding:'4px 10px', border:"1px solid " + preset.preview, color:preset.preview, fontSize:10, fontWeight:700 } },
          preset.label
        ),

        h('div', { style:{ position:'absolute', top:10, right:10, display:'flex', gap:6 } },
          h('button', {
            onClick: () => fileInputRef.current.click(),
            style: { background: bgImage ? '#25D366' : 'rgba(0,0,0,0.8)', backdropFilter:'blur(4px)', borderRadius:20, padding:'4px 10px', border:'1px solid #444', color:'#fff', fontSize:10, fontWeight:600, cursor:'pointer' }
          }, bgImage ? '📸 Foto Caricata' : '📸 Carica Foto'),
          h('button', {
            onClick: () => setIsNight(!isNight),
            style: { background:'rgba(0,0,0,0.8)', backdropFilter:'blur(4px)', borderRadius:20, padding:'4px 10px', border:'1px solid #444', color:'#fff', fontSize:10, fontWeight:600, cursor:'pointer' }
          }, isNight ? '🌙 Notte' : '☀️ Giorno')
        ),

        h('input', { type:'file', accept:'image/*', ref:fileInputRef, onChange:handleFileChange, style:{display:'none'} })
      ),

      // SELETTORE LINEE GUIDA (Visibile solo se l'utente carica la sua foto)
      bgImage && h('div', { style:{...card, background:'#1a1a26', border:'1px solid #3a4aff'} },
        h('span', { style:{ ...label, color:'#8a9aff' } }, 'Adatta il tubo LED alle linee della tua foto:'),
        h('div', { style:{ display:'flex', gap:6 } },
          [
            {id:"porte", title:"Cornice Porte", desc:"Profilo ingressi"},
            {id:"vetrina", title:"Vetrina Intera", desc:"Profilo esterno"},
            {id:"insegna", title:"Linea Insegna", desc:"Fascia alta"}
          ].map(lay => 
            h('button', {
              key: lay.id, onClick: () => setOverlayLayout(lay.id),
              style: { flex:1, padding:'8px', borderRadius:10, fontSize:11, background: overlayLayout===lay.id ? '#fff' : '#111', color: overlayLayout===lay.id ? '#000' : '#aaa', border:'none', cursor:'pointer', fontWeight:'bold' }
            }, 
              h('div', null, lay.title),
              h('div', { style:{fontSize:8, opacity:0.6, fontWeight:'normal'} }, lay.desc)
            )
          )
        )
      ),

      // CALCOLATORE ROI ENERGETICO SMART
      h('div', { style:{...card, background:'linear-gradient(135deg, #0d1b12 0%, #0d0d12 100%)', border:'1px solid #1e3a27'} },
        h('div', { style:{ display:'flex', alignItems:'center', gap:10, marginBottom:8 } },
          h('div', { style:{ background:'#25D366', width:8, height:8, borderRadius:'50%' } }),
          h('span', { style:{ color:'#25D366', fontSize:10, fontWeight:800, letterSpacing:2 } }, 'IMPATTO IN BOLLETTA & RISPARMIO ENERGETICO')
        ),
        h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center' } },
          h('div', null,
            h('div', { style:{ color:'#aaa', fontSize:12 } }, 'Risparmio stimato con Dreamlights LED:'),
            h('div', { style:{ color:'#666', fontSize:10, marginTop:2 } }, `Rispetto ai vecchi sistemi neon calcolato su ${metri} metri lineari.`)
          ),
          h('div', { style:{ textAlign:'right' } },
            h('div', { style:{ color:'#25D366', fontSize:22, fontWeight:900 } }, `~ €${risparmioAnnuo} / anno`),
            h('div', { style:{ color:'#444', fontSize:9, textTransform:'uppercase', fontWeight:700 } }, 'Meno emissioni Co2')
          )
        )
      ),

      // 1. COLORE
      h('div', { style:{...card} },
        h('span', { style:label }, 'Colore tubo LED'),
        h('div', { style:{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:8 } },
          LED_PRESETS.map(p => {
            const isSelected = preset.id === p.id;
            return h('button', {
              key: p.id, onClick: () => setPreset(p),
              style:{ background: isSelected ? '#1f1f2e':'#111', border:"2px solid " + (isSelected ? p.preview : '#2a2a2a'), borderRadius:12, padding:'10px 8px', cursor:'pointer', display:'flex', alignItems:'center', gap:10, position:'relative', textAlign:'left' }
            },
              h('div', { style:{ width:14, height:14, borderRadius:'50%', background:p.preview, boxShadow: isSelected ? "0 0 10px " + p.preview :'none', flexShrink:0 } }),
              h('div', null,
                h('div', { style:{ color:'#fff', fontSize:11, fontWeight:700 } }, p.label),
                h('div', { style:{ color: isSelected ? p.preview : '#666', fontSize:10 } }, p.sub)
              )
            );
          })
        )
      ),

      // 2. LUMINOSITÀ
      h('div', { style:{...card} },
        h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 } },
          h('span', { style:label }, 'Intensità luminosa'),
          h('span', { style:{ color:'#fff', fontSize:15, fontWeight:800 } }, brightness + '%')
        ),
        h('input', { type:'range', min:10, max:100, step:5, value:brightness, onChange:e=>setBrightness(parseInt(e.target.value)), style:sliderStyle(preset.preview) })
      ),

      // 3. SPESSORE SEZIONE TONDA
      h('div', { style:{...card} },
        h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 } },
          h('span', { style:label }, 'Spessore tubo'),
          h('span', { style:{ color:'#fff', fontSize:12, fontWeight:700 } }, tubeLabel)
        ),
        h('div', { style:{ display:'flex', gap:6, marginBottom:12 } },
          [{v:3,label:'13mm',sub:'Slim'},{v:5,label:'17mm',sub:'Standard'},{v:8,label:'24mm',sub:'Large'},{v:10,label:'26mm',sub:'XL'}].map(opt =>
            h('button', {
              key:opt.v, onClick:()=>setTubeWidth(opt.v),
              style:{ flex:1, padding:'8px 4px', borderRadius:10, fontSize:11, fontWeight:600, background: tubeWidth===opt.v ? '#222':'#111', color: tubeWidth===opt.v ? preset.preview:'#444', border:"2px solid " + (tubeWidth===opt.v ? preset.preview:'#222'), cursor:'pointer', textAlign:'center' }
            }, h('div', null, opt.label))
          )
        ),
        h('div', { style:{ background:'#0d0d0d', borderRadius:10, padding:10, display:'flex', alignItems:'center', justifyContent:'center', border:'1px dashed #222', gap:15 } },
          h('svg', { width:44, height:44, viewBox:'0 0 60 60' },
            h('circle', { cx:30, cy:30, r:12 + tw * 1.3, fill:'none', stroke:'#2a4a7a', strokeWidth:2, opacity:0.4 }),
            h('circle', { cx:30, cy:30, r:8 + tw * 1.3, fill:'none', stroke:preset.preview, strokeWidth:tw * 0.5, style:{ filter: 'blur(1px)' } })
          ),
          h('div', { style:{ fontSize:11, color:'#555', fontFamily:'monospace' } }, `Sezione CAD reale: diametro ~${mmReali}mm ad alta precisione.`)
        )
      ),

      // 4. METRAGGIO + PREZZO (€30 CORRETTO)
      h('div', { style:{...card} },
        h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 } },
          h('span', { style:label }, 'Metratura installazione'),
          h('span', { style:{ color:'#fff', fontSize:18, fontWeight:900 } }, metri + ' m')
        ),
        h('input', { type:'range', min:1, max:100, step:1, value:metri, onChange:e=>setMetri(parseInt(e.target.value)), style:sliderStyle(preset.preview) }),
        h('div', { style:{ background:'#0d0d0d', borderRadius:12, padding:'14px', border:"1px solid " + preset.preview + "33", display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:10 } },
          h('div', null,
            h('div', { style:{ color:'#777', fontSize:11 } }, 'Stima costo materiale'),
            h('div', { style:{ color:'#444', fontSize:10 } }, metri + ' m × €' + PREZZO_PER_METRO + ',00/m')
          ),
          h('div', { style:{ color:preset.preview, fontSize:32, fontWeight:900 } }, '€' + prezzoTotale)
        )
      ),

      // 5. GALLERIA PROGETTI ROMANI REALIZZATI (In attesa delle tue foto)
      h('div', { style:{...card} },
        h('span', { style:label }, 'Progetti Realizzati a Roma · Dreamlights'),
        h('div', { style:{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, marginTop:5 } },
          [1, 2, 3].map(i => 
            h('div', { key:i, style:{ background:'#222', borderRadius:8, height:75, display:'flex', alignItems:'center', justifyContent:'center', border:'1px dashed #444', position:'relative', overflow:'hidden' } },
              h('span', { style:{ fontSize:9, color:'#555', textAlign:'center', padding:4, fontFamily:'monospace' } }, `Foto Lavoro ${i}\nin arrivo...`)
            )
          )
        ),
        h('div', { style:{ color:'#444', fontSize:9, marginTop:8, fontStyle:'italic', textAlign:'center' } }, "I nostri lavori certificati sul territorio di Roma e provincia.")
      ),

      // AZIONI E INVIO
      h('button', {
        onClick: () => setShowRiepilogo(r => !r),
        style:{ width:'100%', padding:14, borderRadius:14, border:"2px solid " + preset.preview, background: showRiepilogo ? preset.preview:'transparent', color: showRiepilogo ? '#000':preset.preview, fontSize:13, fontWeight:800, cursor:'pointer', marginBottom:12 }
      }, showRiepilogo ? '✓ Chiudi opzioni di invio' : '📋 Richiedi Sopralluogo / Salva Configurazione'),

      showRiepilogo && h('div', { style:{ width:'100%', background:'#111', borderRadius:14, padding:16, border:"1px solid " + preset.preview + "44", display:'flex', flexDirection:'column', gap:12 } },
        h('button', { onClick: generaPDF, style: { width:'100%', padding:'12px', borderRadius:12, background:'#3b82f6', color:'#fff', fontWeight:800, border:'none', cursor:'pointer' } }, '📄 Scarica Preventivo con ROI in PDF'),
