<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
  const { useState } = React;
  const h = React.createElement;

  // Nuova lista colori con stati di magazzino aggiornati
  const LED_PRESETS = [
    { id: "warm3000", label: "Bianco Caldo", sub: "3000K", color: "#FFE090", glow: "#FFB020", tube: "#FFC840", preview: "#FFD870", note: "Caldo classico", stock: "disponibile" },
    { id: "orange",   label: "Arancione",    sub: "Neon",  color: "#FF9020", glow: "#FF4400", tube: "#FF6A00", preview: "#FF7010", note: "Neon classico", stock: "disponibile" },
    { id: "warm2300", label: "Bianco Caldo", sub: "2300K", color: "#FFD080", glow: "#FF8800", tube: "#FFA020", preview: "#FFB030", note: "Ambrato", stock: "ordinabile" },
    { id: "cold4000", label: "Bianco Neutro", sub: "4000K", color: "#E8F4FF", glow: "#70BAFF", tube: "#A8D8FF", preview: "#C0E4FF", note: "Brillante", stock: "ordinabile" },
    { id: "purple",   label: "Viola",        sub: "Neon",  color: "#E080FF", glow: "#A000FF", tube: "#D040FF", preview: "#E070FF", note: "Intenso", stock: "ordinabile" },
    { id: "green",    label: "Verde",        sub: "Neon",  color: "#80FF90", glow: "#00FF44", tube: "#40FF6A", preview: "#70FF85", note: "Fluo", stock: "ordinabile" },
    { id: "red",      label: "Rosso",        sub: "Neon",  color: "#FF8080", glow: "#FF0000", tube: "#FF4040", preview: "#FF6060", note: "Deep Red", stock: "ordinabile" },
    { id: "yellow",   label: "Giallo",       sub: "Neon",  color: "#FFFF80", glow: "#D4FF00", tube: "#EEEE40", preview: "#FFFF60", note: "Vivo", stock: "ordinabile" },
  ];

  const PREZZO_PER_METRO = 300 / 9;

  function LedPreview({ ledColor, brightness, tubeWidth, isNight }) {
    const b = Math.max(0.1, brightness / 100);
    const { color, glow, tube } = ledColor;
    const tw = tubeWidth * 1.8;
    const W = 560, H = 300;
    const d1 = { x: 60,  y: 60, w: 170, h: 195 };
    const d2 = { x: 330, y: 60, w: 170, h: 195 };

    const bpBg = isNight ? "#030305" : "#0a0f1a";
    const bpGrid = isNight ? "rgba(255,255,255,0.02)" : "rgba(80,140,255,0.07)";
    const bpLine = isNight ? "rgba(255,255,255,0.1)" : "rgba(100,160,255,0.22)";
    const bpDash = isNight ? "rgba(255,255,255,0.05)" : "rgba(100,160,255,0.13)";
    const bpText = isNight ? "rgba(255,255,255,0.2)" : "rgba(120,170,255,0.35)";

    function ledPath(d) {
      return `M ${d.x} ${d.y + d.h} L ${d.x} ${d.y} L ${d.x + d.w} ${d.y} L ${d.x + d.w} ${d.y + d.h}`;
    }

    function Door({ d }) {
      return h('g', null,
        h('rect', { x: d.x-14, y: d.y-14, width: d.w+28, height: d.h+14, fill:'none', stroke: bpLine, strokeWidth:1, strokeDasharray:'6 4' }),
        h('rect', { x: d.x, y: d.y, width: d.w, height: d.h, fill: isNight ? 'rgba(0,0,0,0.2)' : 'rgba(80,140,255,0.04)', stroke: bpLine, strokeWidth:0.8 }),
        h('rect', { x: d.x, y: d.y+68, width: d.w, height: 18, fill: isNight ? 'rgba(255,255,255,0.02)' : 'rgba(80,140,255,0.06)', stroke: bpDash, strokeWidth:0.6 }),
        h('text', { x: d.x+d.w/2, y: d.y+81, textAnchor:'middle', fontSize:7, fill: bpText, fontFamily:'monospace', letterSpacing:2 }, 'NEGOZIO'),
        h('line', { x1: d.x+12, y1: d.y+100, x2: d.x+12, y2: d.y+d.h-8, stroke: bpDash, strokeWidth:0.5 }),
        h('line', { x1: d.x+d.w-12, y1: d.y+100, x2: d.x+d.w-12, y2: d.y+d.h-8, stroke: bpDash, strokeWidth:0.5 }),
        h('line', { x1: d.x, y1: d.y+d.h+18, x2: d.x+d.w, y2: d.y+d.h+18, stroke: bpDash, strokeWidth:0.6 }),
        h('line', { x1: d.x, y1: d.y+d.h+14, x2: d.x, y2: d.y+d.h+22, stroke: bpDash, strokeWidth:0.6 }),
        h('line', { x1: d.x+d.w, y1: d.y+d.h+14, x2: d.x+d.w, y2: d.y+d.h+22, stroke: bpDash, strokeWidth:0.6 }),
        h('text', { x: d.x+d.w/2, y: d.y+d.h+28, textAnchor:'middle', fontSize:6, fill: bpText, fontFamily:'monospace' }, (d.w*10)+' cm')
      );
    }

    function Glow({ d }) {
      const p = ledPath(d);
      const nightMultiplier = isNight ? 1.5 : 1;
      return h('g', null,
        h('path', { d:p, fill:'none', stroke:glow, strokeWidth:tw*16, strokeLinecap:'round', strokeLinejoin:'round', opacity:0.06*b*nightMultiplier, style:{filter:'blur(22px)'} }),
        h('path', { d:p, fill:'none', stroke:glow, strokeWidth:tw*7,  strokeLinecap:'round', strokeLinejoin:'round', opacity:0.14*b*nightMultiplier, style:{filter:'blur(7px)'} }),
        h('path', { d:p, fill:'none', stroke:glow, strokeWidth:tw*3,  strokeLinecap:'round', strokeLinejoin:'round', opacity:0.42*b*nightMultiplier, style:{filter:'blur(2px)'} }),
        h('path', { d:p, fill:'none', stroke:tube, strokeWidth:tw,    strokeLinecap:'round', strokeLinejoin:'round', opacity:0.97 }),
        h('path', { d:p, fill:'none', stroke:color,strokeWidth:tw*0.42,strokeLinecap:'round', strokeLinejoin:'round', opacity:b }),
        h('path', { d:p, fill:'none', stroke:'white',strokeWidth:tw*0.16,strokeLinecap:'round',strokeLinejoin:'round',opacity:0.45*b,strokeDasharray:'7 16' })
      );
    }

    const gridLines = Array.from({length:10}).map((_,i) =>
      h('line', { key:i, x1:30, y1:30+i*22, x2:W-30, y2:30+i*22, stroke:bpDash, strokeWidth:0.3 })
    );
    const menuLines = Array.from({length:6}).map((_,i) =>
      h('line', { key:i, x1:d1.x+d1.w+20, y1:100+i*9, x2:d1.x+d1.w+56, y2:100+i*9, stroke:bpDash, strokeWidth:0.4 })
    );

    return h('svg', { viewBox:`0 0 ${W} ${H}`, style:{width:'100%',borderRadius:12,display:'block', transition:'background 0.3s'} },
      h('defs', null,
        h('pattern', { id:'grid', x:0, y:0, width:20, height:20, patternUnits:'userSpaceOnUse' },
          h('path', { d:'M 20 0 L 0 0 0 20', fill:'none', stroke:bpGrid, strokeWidth:0.5 })
        )
      ),
      h('rect', { width:W, height:H, fill:bpBg }),
      h('rect', { width:W, height:H, fill:'url(#grid)' }),
      h('rect', { x:30, y:20, width:W-60, height:10, fill:'none', stroke:bpLine, strokeWidth:0.8, strokeDasharray:'8 4' }),
      h('line', { x1:30, y1:20, x2:W-30, y2:20, stroke:bpLine, strokeWidth:1 }),
      h('rect', { x:30, y:30, width:W-60, height:H-60, fill: isNight ? 'transparent' : 'rgba(80,140,255,0.02)', stroke:bpLine, strokeWidth:0.8, strokeDasharray:'10 5' }),
      ...gridLines,
      h('rect', { x:36, y:52, width:18, height:14, fill:'none', stroke:bpDash, strokeWidth:0.6 }),
      h('text', { x:45, y:63, textAnchor:'middle', fontSize:6, fill:bpText, fontFamily:'monospace' }, '20'),
      h('rect', { x:W-54, y:52, width:18, height:14, fill:'none', stroke:bpDash, strokeWidth:0.6 }),
      h('text', { x:W-45, y:63, textAnchor:'middle', fontSize:6, fill:bpText, fontFamily:'monospace' }, '21'),
      h('rect', { x:d1.x+d1.w+16, y:90, width:44, height:60, fill:'none', stroke:bpDash, strokeWidth:0.5, strokeDasharray:'3 3' }),
      ...menuLines,
      h(Door, { d:d1 }),
      h(Door, { d:d2 }),
      h(Glow, { d:d1 }),
      h(Glow, { d:d2 }),
      h('ellipse', { cx:d1.x+d1.w/2, cy:H-20, rx:70, ry:7, fill:glow, opacity:0.1*b, style:{filter:'blur(6px)'} }),
      h('ellipse', { cx:d2.x+d2.w/2, cy:H-20, rx:70, ry:7, fill:glow, opacity:0.1*b, style:{filter:'blur(6px)'} }),
      h('text', { x:36, y:16, fontSize:6, fill:bpText, fontFamily:'monospace', letterSpacing:2 }, 'DREAMLIGHTS · PROGETTO ILLUMINAZIONE · ROMA'),
      h('line', { x1:30, y1:H-40, x2:W-30, y2:H-40, stroke:bpDash, strokeWidth:0.5, strokeDasharray:'4 6' })
    );
  }

  function App() {
    const [preset, setPreset] = useState(LED_PRESETS[0]);
    const [brightness, setBrightness] = useState(85);
    const [tubeWidth, setTubeWidth] = useState(5);
    const [metri, setMetri] = useState(9);
    const [isNight, setIsNight] = useState(false);
    const [showRiepilogo, setShowRiepilogo] = useState(false);

    const prezzoTotale = Math.round(metri * PREZZO_PER_METRO);
    const tw = tubeWidth;
    
    // Configurazione spessori aggiornata (13, 17, 24, 26)
    const tubeLabel = tw <= 3 ? "13mm · Slim" : tw <= 5 ? "17mm · Standard" : tw <= 8 ? "24mm · Large" : "26mm · XL";

    const sliderStyle = (col) => ({ width:'100%', accentColor: col });
    const card = { background:'#161616', borderRadius:14, padding:16, border:'1px solid #222', marginBottom:12, width:'100%' };
    const label = { color:'#555', fontSize:10, letterSpacing:3, textTransform:'uppercase', marginBottom:10, display:'block' };

    const generaPDF = () => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setFillColor(10, 10, 15);
      doc.rect(0, 0, 210, 40, 'F');
      
      doc.setTextColor(255, 255, 255);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(22);
      doc.text("DREAMLIGHTS ROMA", 20, 20);
      
      doc.setFont("helvetica", "normal");
      doc.setFontSize(10);
      doc.setTextColor(150, 150, 150);
      doc.text("Preventivo Indicativo Impianto LED Professionale", 20, 30);

      doc.setTextColor(40, 40, 40);
      doc.setFontSize(14);
      doc.setFont("helvetica", "bold");
      doc.text("Riepilogo Configurazione:", 20, 60);

      const dettagli =
