<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dreamlights · Configuratore LED PRO · Roma</title>
  <meta name="description" content="Configura il tuo impianto LED professionale con Dreamlights Roma. Scegli colore, metratura e ottieni una stima immediata." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0a0a0f; min-height: 100vh; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; color: #fff; overscroll-behavior: none; }
    button { font-family: inherit; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: #2a2a2a; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid #0a0f1a; }
    .handle { cursor: move; touch-action: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <script>
  const { useState, useRef, useEffect } = React;
  const h = React.createElement;

  const LED_PRESETS = [
    { id: "warm3000", label: "Bianco Caldo", sub: "3000K", color: "#FFE090", glow: "#FFB020", tube: "#FFC840", preview: "#FFD870", note: "Pronta Consegna", stock: "disponibile" },
    { id: "orange",   label: "Arancione",    sub: "Neon",  color: "#FF9020", glow: "#FF4400", tube: "#FF6A00", preview: "#FF7010", note: "Pronta Consegna", stock: "disponibile" },
    { id: "warm2300", label: "Bianco Caldo", sub: "2300K", color: "#FFD080", glow: "#FF8800", tube: "#FFA020", preview: "#FFB030", note: "Su Ordinazione", stock: "ordinabile" },
    { id: "cold4000", label: "Bianco Neutro", sub: "4000K", color: "#E8F4FF", glow: "#70BAFF", tube: "#A8D8FF", preview: "#C0E4FF", note: "Su Ordinazione", stock: "ordinabile" },
    { id: "purple",   label: "Viola",        sub: "Neon",  color: "#E080FF", glow: "#A000FF", tube: "#D040FF", preview: "#E070FF", note: "Su Ordinazione", stock: "ordinabile" },
    { id: "green",    label: "Verde",        sub: "Neon",  color: "#80FF90", glow: "#00FF44", tube: "#40FF6A", preview: "#70FF85", note: "Su Ordinazione", stock: "ordinabile" },
    { id: "red",      label: "Rosso",        sub: "Neon",  color: "#FF8080", glow: "#FF0000", tube: "#FF4040", preview: "#FF6060", note: "Su Ordinazione", stock: "ordinabile" },
    { id: "yellow",   label: "Giallo",       sub: "Neon",  color: "#FFFF80", glow: "#D4FF00", tube: "#EEEE40", preview: "#FFFF60", note: "Su Ordinazione", stock: "ordinabile" },
  ];

  const PROGETTI_FOTO = [
    { url: "lavoro1.png", info: "Allestimento Roma" }, 
    { url: "lavoro2.png", info: "Vetrina Frascati" },
    { url: "lavoro3.png", info: "Installazione Negozio" }
  ];

  const PREZZO_PER_METRO = 30;

  // COMPONENTE VISUALIZZATORE CON TRASCINAMENTO PUNTI (ADATTAMENTO REALE)
  function LedPreview({ ledColor, tubeWidth, isNight, bgImage, points, setPoints }) {
    const { color, glow, tube } = ledColor;
    const tw = tubeWidth * 1.8;
    const W = 560, H = 340;
    const svgRef = useRef(null);
    const [activePoint, setActivePoint] = useState(null);

    // Genera la linea continua unendo i punti inseriti dall'utente
    let pathData = "";
    if (points.length > 0) {
      pathData = `M ${points[0].x} ${points[0].y} ` + points.slice(1).map(p => `L ${p.x} ${p.y}`).join(" ");
    }

    const handlePointerDown = (index) => (e) => {
      e.preventDefault();
      setActivePoint(index);
    };

    useEffect(() => {
      const handlePointerMove = (e) => {
        if (activePoint === null || !svgRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        
        // Calcola la posizione proporzionale all'interno dell'SVG (0-560 e 0-340)
        let x = ((e.clientX - rect.left) / rect.width) * W;
        let y = ((e.clientY - rect.top) / rect.height) * H;
        
        // Limiti per non far uscire i punti dallo schermo
        x = Math.max(10, Math.min(W - 10, x));
        y = Math.max(10, Math.min(H - 10, y));

        setPoints(prev => prev.map((p, i) => i === activePoint ? { x, y } : p));
      };

      const handlePointerUp = () => {
        setActivePoint(null);
      };

      if (activePoint !== null) {
        window.addEventListener('pointermove', handlePointerMove);
        window.addEventListener('pointerup', handlePointerUp);
      }
      return () => {
        window.removeEventListener('pointermove', handlePointerMove);
        window.removeEventListener('pointerup', handlePointerUp);
      };
    }, [activePoint]);

    const bpBg = isNight ? "#030305" : "#0a0f1a";
    const bpGrid = isNight ? "rgba(255,255,255,0.02)" : "rgba(80,140,255,0.06)";
    const nightMultiplier = isNight ? 1.6 : 1;

    return h('svg', { 
      ref: svgRef,
      viewBox: `0 0 ${W} ${H}`, 
      style: { width: '100%', borderRadius: 12, display: 'block', transition: 'background 0.3s', touchAction: 'none' } 
    },
      h('rect', { width: W, height: H, fill: bpBg }),
      bgImage && h('image', { href: bgImage, width: W, height: H, preserveAspectRatio: 'xMidYMid slice', opacity: isNight ? 0.45 : 0.85 }),
      !bgImage && h('rect', { width: W, height: H, fill: 'url(#grid2)' }),
      
      h('defs', null,
        h('pattern', { id: 'grid2', x: 0, y: 0, width: 20, height: 20, patternUnits: 'userSpaceOnUse' },
          h('path', { d: 'M 20 0 L 0 0 0 20', fill: 'none', stroke: bpGrid, strokeWidth: 0.5 })
        )
      ),

      // Rendering del Tubo LED Neon con i suoi strati di sfumatura e bagliore
      pathData && h('g', null,
        h('path', { d: pathData, fill: 'none', stroke: glow, strokeWidth: tw * 16, strokeLinecap: 'round', strokeLinejoin: 'round', opacity: 0.06 * nightMultiplier, style: { filter: 'blur(22px)' } }),
        h('path', { d: pathData, fill: 'none', stroke: glow, strokeWidth: tw * 7,  strokeLinecap: 'round', strokeLinejoin: 'round', opacity: 0.14 * nightMultiplier, style: { filter: 'blur(7px)' } }),
        h('path', { d: pathData, fill: 'none', stroke: glow, strokeWidth: tw * 3,  strokeLinecap: 'round', strokeLinejoin: 'round', opacity: 0.42 * nightMultiplier, style: { filter: 'blur(2px)' } }),
        h('path', { d: pathData, fill: 'none', stroke: tube, strokeWidth: tw,    strokeLinecap: 'round', strokeLinejoin: 'round', opacity: 0.97 }),
        h('path', { d: pathData, fill: 'none', stroke: color, strokeWidth: tw * 0.42, strokeLinecap: 'round', strokeLinejoin: 'round', opacity: 1.0 }),
        h('path', { d: pathData, fill: 'none', stroke: 'white', strokeWidth: tw * 0.16, strokeLinecap: 'round', strokeLinejoin: 'round', opacity: 0.45, strokeDasharray: '7 16' })
      ),

      // Pallini di controllo visibili sopra l'immagine per permettere l'adattamento manuale
      points.map((p, i) => 
        h('g', { key: i, className: 'handle', onPointerDown: handlePointerDown(i) },
          // Area sensibile al tocco più grande del pallino visibile per facilitare il dito
          h('circle', { cx: p.x, cy: p.y, r: 22, fill: 'transparent' }),
          // Pallino visibile esterno sfumato
          h('circle', { cx: p.x, cy: p.y, r: 9, fill: 'rgba(0,0,0,0.6)', stroke: ledColor.preview, strokeWidth: 2 }),
          h('circle', { cx: p.x, cy: p.y, r: 4, fill: '#fff' }),
          // Numero del punto per aiutare l'orientamento
          h('text', { x: p.x, y: p.y - 14, textAnchor: 'middle', fontSize: 9, fill: '#fff', fontWeight: 'bold', backgroundColor: '#000' }, i + 1)
        )
      ),

      h('text', { x: 20, y: 20, fontSize: 7, fill: 'rgba(255,255,255,0.3)', fontFamily: 'monospace', letterSpacing: 1 }, 'TRASCOLA I PUNTI GIALLI SULLA TUA PARETE PER ADATTARE IL LED')
    );
  }

  function App() {
    const [preset, setPreset] = useState(LED_PRESETS[0]);
    const [tubeWidth, setTubeWidth] = useState(5);
    const [metri, setMetri] = useState(9);
    const [isNight, setIsNight] = useState(false);
    const [bgImage, setBgImage] = useState(null);
    const fileInputRef = useRef(null);

    // Punti predefiniti che formano una sagoma standard modificabile (Porta/Vetrina generica)
    const [points, setPoints] = useState([
      { x: 120, y: 270 },
      { x: 120, y: 80 },
      { x: 440, y: 80 },
      { x: 440, y: 270 }
    ]);

    const prezzoTotale = metri * PREZZO_PER_METRO;
    const tw = tubeWidth;
    
    const mmReali = tw <= 3 ? 13 : tw <= 5 ? 17 : tw <= 8 ? 24 : 26;
    const tubeLabel = mmReali + "mm · " + (tw <= 3 ? "Slim" : tw <= 5 ? "Standard" : tw <= 8 ? "Large" : "XL");

    const wattAlMetro = 7.5;
    const oreGiornaliere = 8;
    const costoKwhRoma = 0.28;
    
    const consumoKwhGiorno = (metri * wattAlMetro * oreGiornaliere) / 1000;
    const spesaMensile = consumoKwhGiorno * 30 * costoKwhRoma;
    const spesaAnnuale = spesaMensile * 12;

    const raddrizzatoriInclusi = Math.floor(metri / 30) >= 1 ? Math.floor(metri / 30) : 1;
    const notaRaddrizzatore = metri <= 30 
      ? `1 Raddrizzatore incluso nel prezzo` 
      : `${raddrizzatoriInclusi} Raddrizzatori inclusi (Necessario valutare acquisto di un ulteriore raddrizzatore oltre i 30m)`;

    // Resetta i nodi alla forma di base se l'utente vuole ripulire il disegno
    const resettaDisegno = (tipo) => {
      if (tipo === "porta") {
        setPoints([{ x: 140, y: 280 }, { x: 140, y: 70 }, { x: 420, y: 70 }, { x: 420, y: 280 }]);
      } else if (tipo === "linea") {
        setPoints([{ x: 60, y: 100 }, { x: 500, y: 100 }]);
      } else {
        setPoints([{ x: 80, y: 280 }, { x: 80, y: 60 }, { x: 480, y: 60 }, { x: 480, y: 280 }]);
      }
    };

    const handleFileChange = (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => setBgImage(event.target.result);
        reader.readAsDataURL(file);
      }
    };

    const sliderStyle = (col) => ({ width:'100%', accentColor: col });
    const card = { background:'#161616', borderRadius:14, padding:16, border:'1px solid #222', marginBottom:12, width:'100%' };
    const label = { color:'#555', fontSize:10, letterSpacing:3, textTransform:'uppercase', marginBottom:10, display:'block' };

    const ottieniTestoWhatsApp = () => {
      const testo = 
        `*DREAMLIGHTS ROMA — RIEPILOGO CONFIGURAZIONE*\n` +
        `-----------------------------------------\n` +
        `• *Colore scaturito:* ${preset.label} (${preset.sub})\n` +
        `• *Stato magazzino:* ${preset.note}\n` +
        `• *Spessore tubo:* ${tubeLabel}\n` +
        `• *Metratura totale:* ${metri} metri lineari\n` +
        `-----------------------------------------\n` +
        `• *Stima Costo Materiale:* €${prezzoTotale},00 + IVA\n` +
        `• *Alimentazione:* Ogni 30 metri lineari 1 raddrizzatore incluso\n` +
        `• *Nota Manodopera:* Costi di installazione e manodopera esclusi, da preventivare a parte.\n\n` +
        `Ciao Dreamlights, ho configurato l'impianto ideale per il mio locale tramite il sito e adattato la linea sulla foto. Vorrei maggiori informazioni e concordare un sopralluogo tecnico.`;
      
      return encodeURIComponent(testo);
    };

    return h('div', { style:{ minHeight:'100vh', background:'#0a0a0f', display:'flex', flexDirection:'column', alignItems:'center', padding:'24px 16px 60px', maxWidth:520, margin:'0 auto' } },

      // HEADER
      h('div', { style:{ width:'100%', textAlign:'center', marginBottom:22 } },
        h('div', { style:{ fontSize:10, letterSpacing:5, color:'#2a4a7a', textTransform:'uppercase', marginBottom:8, fontFamily:'monospace' } }, 'Roma · Illuminazione Professionale'),
        h('div', { style:{ fontSize:30, fontWeight:900, color:'#fff', letterSpacing:4, textTransform:'uppercase' } }, 'Dreamlights'),
        h('div', { style:{ width:'40px', height:'2px', background:'linear-gradient(90deg,transparent,#4a8aff,transparent)', margin:'10px auto' } }),
        h('div', { style:{ fontSize:11, color:'#3a5a8a', letterSpacing:1 } }, 'Configura online · Trascina il LED sui tuoi spazi')
      ),

      // ETICHETTE SOPRA IL VISUALIZZATORE
      h('div', { style:{ width:'100%', display:'flex', justifyContent:'space-between', alignItems:'center', padding:'0 4px 8px', fontSize:12 } },
        h('div', { style:{ display:'flex', alignItems:'center', gap:6 } },
          h('div', { style:{ width:8, height:8, borderRadius:'50%', background:preset.preview, boxShadow:"0 0 8px " + preset.preview } }),
          h('span', { style:{ fontWeight:700 } }, preset.label)
        ),
        h('span', { style:{ fontSize:10, fontWeight:'bold', textTransform:'uppercase', color: preset.stock === "disponibile" ? '#10b981' : '#f59e0b', background:'rgba(255,255,255,0.03)', padding:'3px 8px', borderRadius:6, border:'1px solid rgba(255,255,255,0.05)' } }, preset.note)
      ),

      // CONFIGURATORE ADATTIVO INTERATTIVO A PUNTI
      h('div', { style:{ width:'100%', borderRadius:14, overflow:'hidden', boxShadow:'0 8px 40px rgba(0,0,0,0.8)', border:'1px solid rgba(80,140,255,0.15)', marginBottom:12, position:'relative', background: isNight ? '#030305' : '#0a0f1a' } },
        h(LedPreview, { ledColor:preset, tubeWidth:tw, isNight, bgImage, points, setPoints }),
        
        h('div', { style:{ position:'absolute', bottom:10, right:10, display:'flex', gap:6, zIndex:10 } },
          h('button', {
            onClick: () => fileInputRef.current.click(),
            style: { background: 'rgba(0,0,0,0.85)', backdropFilter:'blur(6px)', borderRadius:20, padding:'5px 12px', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:10, fontWeight:600, cursor:'pointer' }
          }, bgImage ? '📸 Cambia Foto' : '📸 Carica la tua Foto'),
          h('button', {
            onClick: () => setIsNight(!isNight),
            style: { background:'rgba(0,0,0,0.85)', backdropFilter:'blur(6px)', borderRadius:20, padding:'5px 12px', border:'1px solid rgba(255,255,255,0.1)', color:'#fff', fontSize:10, fontWeight:600, cursor:'pointer', minWidth:65 }
          }, isNight ? '☀️ Giorno' : '🌙 Notte')
        ),

        h('input', { type:'file', accept:'image/*', ref:fileInputRef, onChange:handleFileChange, style:{display:'none'} })
      ),

      // CAMBIO FORMA VELOCE DI ORIENTAMENTO
      h('div', { style:{...card, background:'#111118', border:'1px solid #222535', display:'flex', justifyContent:'space-between', alignItems:'center', gap:8, padding:10} },
        h('span', { style:{ fontSize:10, color:'#888', fontWeight:'bold', textTransform:'uppercase', paddingLeft:4 } }, 'Forma base:'),
        h('div', { style:{ display:'flex', gap:6 } },
          [
            { id: "porta", label: "🚪 Porta/Vetrina" },
            { id: "rettangolo", label: "🔲 Intero" },
            { id: "linea", label: "➖ Linea Alta" }
          ].map(f => 
            h('button', {
              key: f.id,
              onClick: () => resettaDisegno(f.id),
              style: { background:'#1c1c24', border:'1px solid #333', color:'#ccc', fontSize:10, padding:'5px 10px', borderRadius:8, cursor:'pointer', fontWeight:'600' }
            }, f.label)
          )
        )
      ),

      // BOX IMPATTO IN BOLLETTA
      h('div', { style:{...card, background:'linear-gradient(135deg, #111827 0%, #0f111a 100%)', border:'1px solid #1f2937'} },
        h('div', { style:{ display:'flex', alignItems:'center', gap:10, marginBottom:10 } },
          h('div', { style:{ background:'#10b981', width:8, height:8, borderRadius:'50%', boxShadow:'0 0 8px #10b981' } }),
          h('span', { style:{ color:'#34d399', fontSize:10, fontWeight:800, letterSpacing:2 } }, 'COSTO EFFETTIVO IN BOLLETTA (TECNOLOGIA 230V)')
        ),
        h('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 } },
          h('div', { style:{ background:'#0a0b10', padding:10, borderRadius:10, border:'1px solid #222' } },
            h('div', { style:{ color:'#6b7280', fontSize:10, textTransform:'uppercase', letterSpacing:1 } }, 'Spesa Mensile'),
            h('div', { style:{ color:'#fff', fontSize:20, fontWeight:900, marginTop:2 } }, `€ ${spesaMensile.toFixed(2)}`),
            h('div', { style:{ color:'#4b5563', fontSize:9, marginTop:2 } }, 'Ipotizzando 8h/gg')
          ),
          h('div', { style:{ background:'#0a0b10', padding:10, borderRadius:10, border:'1px solid #222' } },
            h('div', { style:{ color:'#6b7280', fontSize:10, textTransform:'uppercase', letterSpacing:1 } }, 'Spesa Annuale'),
            h('div', { style:{ color:'#34d399', fontSize:20, fontWeight:900, marginTop:2 } }, `€ ${spesaAnnuale.toFixed(2)}`),
            h('div', { style:{ color:'#4b5563', fontSize:9, marginTop:2 } }, '365 giorni di attività')
          )
        ),
        h('div', { style:{ color:'#4b5563', fontSize:9, marginTop:8, textAlign:'center', fontFamily:'monospace' } }, 
          `Specifiche: 7.5 W/m · Assorbimento totale impianto: ~${Math.round(metri * wattAlMetro)}W`
        )
      ),

      // 1. SELETTORE COLORI
      h('div', { style:{...card} },
        h('span', { style:label }, 'Scegli Colore LED'),
        h('div', { style:{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:8 } },
          LED_PRESETS.map(p => {
            const isSelected = preset.id === p.id;
            const isDispo = p.stock === "disponibile";
            return h('button', {
              key: p.id, onClick: () => setPreset(p),
              style:{ background: isSelected ? '#1f1f2e':'#111', border:"2px solid " + (isSelected ? p.preview : '#2a2a2a'), borderRadius:12, padding:'10px 8px', cursor:'pointer', display:'flex', alignItems:'center', gap:10, textAlign:'left' }
            },
              h('div', { style:{ width:14, height:14, borderRadius:'50%', background:p.preview, boxShadow: isSelected ? "0 0 10px " + p.preview :'none', flexShrink:0 } }),
              h('div', null,
                h('div', { style:{ color:'#fff', fontSize:11, fontWeight:700 } }, p.label),
                h('div', { style:{ color: isSelected ? p.preview : '#666', fontSize:10 } }, p.sub),
                h('div', { style:{ color: isDispo ? '#10b981' : '#f59e0b', fontSize:8, fontWeight:'bold', marginTop:2 } }, p.note)
              )
            );
          })
        )
      ),

      // 2. SPESSORE TUBO + ANTEPRIMA TONDA DINAMICA
      h('div', { style:{...card} },
        h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 } },
          h('span', { style:label }, 'Spessore tubo'),
          h('span', { style:{ color:'#fff', fontSize:12, fontWeight:700 } }, tubeLabel)
        ),
        h('div', { style:{ display:'flex', gap:6, marginBottom:16 } },
          [{v:3,label:'13mm',sub:'Slim'},{v:5,label:'17mm',sub:'Standard'},{v:8,label:'24mm',sub:'Large'},{v:10,label:'26mm',sub:'XL'}].map(opt =>
            h('button', {
              key:opt.v, onClick:()=>setTubeWidth(opt.v),
              style:{ flex:1, padding:'8px 4px', borderRadius:10, fontSize:11, fontWeight:600, background: tubeWidth===opt.v ? '#222':'#111', color: tubeWidth===opt.v ? preset.preview:'#444', border:"2px solid " + (tubeWidth===opt.v ? preset.preview:'#222'), cursor:'pointer', textAlign:'center' }
            }, h('div', null, opt.label))
          )
        ),
        h('div', { style:{ background:'#0f0f15', borderRadius:10, padding:12, display:'flex', alignItems:'center', gap:14, border:'1px solid #1a1a24' } },
          h('div', { style:{ width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center', background:'#050507', borderRadius:'50%' } },
            h('div', { style:{ width: tubeWidth * 2.4, height: tubeWidth * 2.4, borderRadius:'50%', background: preset.preview, boxShadow: "0 0 10px " + preset.preview, transition:'all 0.2s ease' } })
          ),
          h('div', null,
            h('div', { style:{ fontSize:11, fontWeight:'bold', color:'#aaa' } }, 'Sezione reale in scala'),
            h('div', { style:{ fontSize:9, color:'#555', marginTop:2 } }, `Proiezione visiva del taglio da ${mmReali}mm`)
          )
        )
      ),

      // 3. METRAGGIO
      h('div', { style:{...card} },
        h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 } },
          h('span', { style:label }, 'Metratura installazione'),
          h('span', { style:{ color:'#fff', fontSize:18, fontWeight:900 } }, metri + ' m')
        ),
        h('input', { type:'range', min:1, max:100, step:1, value:metri, onChange:e=>setMetri(parseInt(e.target.value)), style:sliderStyle(preset.preview) }),
        h('div', { style:{ background:'#0d0d0d', borderRadius:12, padding:'14px', border:"1px solid " + preset.preview + "33", display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:10 } },
          h('div', null,
            h('div', { style:{ color:'#777', fontSize:11 } }, 'Stima costo materiale'),
            h('div', { style:{ color:'#444', fontSize:10 } }, metri + ' m × €' + PREZZO_PER_METRO + ',00/m')
          ),
          h('div', { style:{ color:preset.preview, fontSize:32, fontWeight:900 } }, '€' + prezzoTotale)
        )
      ),

      // 4. GALLERIA CON IMMAGINI REALI DA GITHUB
      h('div', { style:{...card} },
        h('span', { style:label }, 'Progetti Realizzati a Roma · Dreamlights'),
        h('div', { style:{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, marginTop:5 } },
          PROGETTI_FOTO.map((foto, i) => {
            return h('div', { key:i, style:{ background:'#111', borderRadius:8, height:80, border:'1px solid #222', overflow:'hidden', position:'relative' } },
              h('img', { 
                src: foto.url, 
                alt: foto.info, 
                style: { width:'100%', height:'100%', objectFit:'cover' },
                onError: (e) => { e.target.style.display = 'none'; }
              }),
              h('div', { style:{ position:'absolute', bottom:0, left:0, right:0, background:'rgba(0,0,0,0.7)', color:'#aaa', fontSize:7, textAlign:'center', padding:'3px 0', fontFamily:'monospace' } }, foto.info)
            );
          })
        )
      ),

      // 5. RIEPILOGO GENERALE DELLE SELEZIONI E DETTAGLI NOTA TECNICA
      h('div', { style:{...card, background:'#0a0a10', border:'1px solid #2a2a3a'} },
        h('div', { style:{ display:'flex', alignItems:'center', gap:10, marginBottom:12 } },
